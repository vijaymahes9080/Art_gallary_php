<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta http-equiv="X-UA-Compatible" content="IE=edge">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Admin Login</title>
		<link href="../images/icon.png" rel="icon">
		<link href="../css/bootstrap.min.css" rel="stylesheet">
		<link href="../font-awesome/css/font-awesome.min.css" rel="stylesheet">
		<link href="style.css" rel="stylesheet">
	</head>

	<body>
		<nav class="navbar navbar-inverse top-menu">
		  <div class="container-fluid">
			<div class="navbar-header">
			  <a class="navbar-brand" href="../index.html">Art Gallery</a>
			</div>
			<div>
			  <ul class="nav navbar-nav">
				<li><a href="../about_us.html">About</a></li>
			  </ul>
			  <ul class="nav navbar-nav navbar-right">
				<li><a href="registration.html"><span class="glyphicon glyphicon-user"></span> Registration</a><li>
				<li><a href="#" style="color:#fff"><span class="glyphicon glyphicon-log-in"></span> Login</a></li>
			  </ul>
			</div>
		  </div>
		</nav>
		<div class="container">
			<div class="panel panel-primary admin-login">
				<div class="panel-heading">
					<h3>Login</h3>
				</div>
				<div class="panel-body">
					<form class="form-horizontal" role="form" id="adminLoginForm">
					  <div class="bg-danger error_msg" style="padding: 0; display: none;"></div>
					  <div class="form-group input-group">
							<span class="input-group-addon glyphicon glyphicon-envelope" style="top:0"></span>
							<input type="email" name="uname" class="form-control" placeholder="Enter email" required>
					  </div>
					  <div class="form-group input-group">
							<span class="input-group-addon glyphicon glyphicon-lock" style="top:0"></span>
							<input type="password" name="password" class="form-control" placeholder="Enter password" required>
					  </div>
					  <div class="form-group"> 
						  <button type="submit" class="btn btn-primary btn-block">Login</button>
					  </div>
					</form>
				</div>
			</div>
		</div>

		<!-- Scripts -->
		<script src="../js/jquery.js"></script>
		<script src="../js/bootstrap.min.js"></script>
		<script src="../js/database.js"></script>
		<script>
			$(document).ready(function() {
				// If already logged in, redirect to adminHome.html
				if (window.AG_DB.getCurrentAdmin()) {
					window.location.href = 'adminHome.html';
				}

				$('#adminLoginForm').submit(function(e) {
					e.preventDefault();
					const username = $(this).find('input[name="uname"]').val();
					const password = $(this).find('input[name="password"]').val();

					const res = window.AG_DB.loginAdmin(username, password);
					if (res.success) {
						window.location.href = 'adminHome.html';
					} else {
						$('.error_msg').text(res.message).css('padding', '8px').show();
					}
				});
			});
		</script>
	</body>
</html>
